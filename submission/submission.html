<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Joel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style type="text/css">
    html,
    body {
     width: 100%;
     height: 100%;
     background: transparent;
     margin: 0;
     padding: 0;
     font-family: sans-serif;
     overflow: hidden;
}
#overlay-container {
  position: relative;
  width: 100%;
  height: 100%;
}

#skip {
  display: none;
  position: absolute;
  right: 0;
  bottom: 56px;
  padding: 12px 18px;
  background: rgba(20, 20, 20, 0.88);
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-right: none;
  border-radius: 6px 0 0 6px;
  font-size: 18px;
  cursor: pointer; 
  transition: transform 0.2s ease;
}

#buffering-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
}
    
#buffering-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 260px;
    padding: 18px;
    border-radius: 10px;
    background: rgba(25, 25, 25, 0.95);
    color: white;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
}

#buffering-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 8px;
}

#buffering-text {
    font-size: 14px;
    opacity: 0.85;
}
  </style>
</head>

<body>
  <div id="overlay-container">
   <div id="buffering-overlay">
     <div id="buffering-box">
       <div id="buffering-title">Connection unstable</div>
       <div id="buffering-text">Buffering...</div>
     </div>
   </div>
    
    <button id="skip">
      Skip Ad in 5
    </button>
  </div>

  <script type="text/javascript">
    (function(window, document){
      // This is how you tell the parent window that the ad was successfully skipped.
      function adSuccess() {
        window.top.postMessage({ type: 'success' }, '*');
      }

      const skipButton = document.getElementById('skip');
      
      let countdownValue = 5;
      let countdownTimer = null;
      let clickCount = 0;
      
      function updateSkipButton() {
        if (countdownValue > 0) {
          skipButton.textContent = 'Skip Ad in ' + countdownValue;
        } else {
          skipButton.textContent = 'Skip Ad';
        }
      }
      
      function startCountdown() {
        clearInterval(countdownTimer);
        countdownValue = 5;
        clickCount = 0;
        skipButton.style.transform = 'scale(1)';
        updateSkipButton();

        countdownTimer = setInterval(() => {
          countdownValue--;
          updateSkipButton();

          if (countdownValue <= 0) {
            clearInterval(countdownTimer);
          }
        }, 1000);
       }
      
      function growSkipButton() {
        clickCount++;
        const scaleAmount = 1 + (clickCount * 0.08);
        skipButton.style.transform = 'scale(' + scaleAmount + ')';
      }
      
      // Listen for messages from the game shell
      window.addEventListener('message', (event) => {
        if (!event.data || !event.data.type) return;

        if (event.data.type === 'adStarted') {
          // Show the skip button when the ad starts
          skipButton.style.display = 'block';
          startCountdown();
        }

        // By default, if the user doesn't "skip" the ad before the video ends,
        // we call fail to restart. You're welcome to replace this with a survey
        // or other interaction instead (see examples/survey).
        if (event.data.type === 'adFinished') {
          skipButton.style.display = 'none';
          window.top.postMessage({ type: 'fail' }, '*');
        }
      });

      // Your ad overlay code goes here, we've added a simple example below:
      skipButton.addEventListener('click', () => {
          growSkipButton();
          
	  if (countdownValue <= 0) {
	    startCountdown();
          }
      });

    })(window, document);
  </script>
</body>
</html>
