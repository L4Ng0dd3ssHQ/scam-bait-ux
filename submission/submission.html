<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Joel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style type="text/css">
    html,
    body {
      width: 100%;
      height: 100%;
      background: transparent;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      overflow: hidden;
    }

    #overlay-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #skip {
      display: none;
      position: absolute;
      right: 0;
      bottom: 56px;
      padding: 12px 18px;
      background: rgba(20, 20, 20, 0.88);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-right: none;
      border-radius: 6px 0 0 6px;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    #buffering-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    #buffering-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 260px;
      padding: 18px;
      border-radius: 10px;
      background: rgba(25, 25, 25, 0.95);
      color: white;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    #spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto 14px;
      border: 4px solid rgba(255, 255, 255, 0.25);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #buffering-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    #buffering-text {
      font-size: 14px;
      opacity: 0.85;
    }
  </style>
</head>
<body>

<div id="overlay-container">
  <div id="skip">Skip</div>

  <div id="buffering-overlay">
    <div id="buffering-box">
      <div id="spinner"></div>
      <div id="buffering-title">Buffering…</div>
      <div id="buffering-text">Please wait a moment</div>
    </div>
  </div>
</div>

<script>
  const bufferingEveryMs = 5000;
  const bufferingDurationMs = 10000;

  let bufferingTimer = null;
  let bufferingLoop = null;
  let adRunning = false;

  let isBuffering = false; // <-- NEW

  const bufferingOverlay = document.getElementById('buffering-overlay');

  function showBuffering() {
    if (isBuffering) return; // <-- NEW
    isBuffering = true;      // <-- NEW

    bufferingOverlay.style.display = 'block';
    sendToParent({ type: 'pause' });

    bufferingTimer = setTimeout(hideBuffering, bufferingDurationMs);
  }

  function hideBuffering() {
    bufferingOverlay.style.display = 'none';
    isBuffering = false; // <-- NEW
    sendToParent({ type: 'resume' });
  }

  function sendToParent(message) {
    window.parent.postMessage(message, '*');
  }

  bufferingLoop = setInterval(showBuffering, bufferingEveryMs);
</script>

</body>
</html>
