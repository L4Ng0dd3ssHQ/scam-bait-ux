<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Joel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style type="text/css">
    html,
    body {
      width: 100%;
      height: 100%;
      background: transparent;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      overflow: hidden;
    }

    #overlay-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #skip {
      display: none;
      position: absolute;
      right: 0;
      bottom: 56px;
      padding: 12px 18px;
      background: rgba(20, 20, 20, 0.88);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-right: none;
      border-radius: 6px 0 0 6px;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    #buffering-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    #buffering-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 260px;
      padding: 18px;
      border-radius: 10px;
      background: rgba(25, 25, 25, 0.95);
      color: white;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    #spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto 14px;
      border: 4px solid rgba(255, 255, 255, 0.25);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #buffering-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    #buffering-text {
      font-size: 14px;
      opacity: 0.85;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="overlay-container">
    <div id="buffering-overlay">
      <div id="buffering-box">
        <div id="spinner"></div>
        <div id="buffering-title">Connection unstable</div>
        <div id="buffering-text">Buffering...</div>
      </div>
    </div>

    <button id="skip">Skip Ad in 5</button>
  </div>

  <script type="text/javascript">
    (function (window, document) {
      function sendToParent(message) {
        window.top.postMessage(message, '*');
      }

      const skipButton = document.getElementById('skip');
      const bufferingOverlay = document.getElementById('buffering-overlay');

      const countdownStart = 5;
      const bufferingEveryMs = 7000;
      const bufferingDurationMs = 2200;

      let countdownValue = countdownStart;
      let countdownTimer = null;
      let clickCount = 0;
      let bufferingTimer = null;
      let bufferingLoop = null;
      let adRunning = false;

      function updateSkipButton() {
        if (countdownValue > 0) {
          skipButton.textContent = 'Skip Ad in ' + countdownValue;
        } else {
          skipButton.textContent = 'Skip Ad';
        }
      }

      function startCountdown() {
        clearInterval(countdownTimer);
        countdownValue = countdownStart;
        updateSkipButton();

        countdownTimer = setInterval(() => {
          countdownValue--;
          updateSkipButton();

          if (countdownValue <= 0) {
            clearInterval(countdownTimer);
          }
        }, 1000);
      }

      function resetSkipButton() {
        clickCount = 0;
        skipButton.style.transform = 'scale(1)';
      }

      function growSkipButton() {
        clickCount++;
        const scaleAmount = 1 + (clickCount * 0.08);
        skipButton.style.transform = 'scale(' + scaleAmount + ')';
      }

      function showBuffering() {
        bufferingOverlay.style.display = 'block';
        sendToParent({ type: 'pause' });
      }

      function hideBuffering() {
        bufferingOverlay.style.display = 'none';
        sendToParent({ type: 'play' });
      }

      function triggerBuffering() {
        if (!adRunning || bufferingOverlay.style.display === 'block') {
          return;
        }

        showBuffering();
        startCountdown();

        clearTimeout(bufferingTimer);
        bufferingTimer = setTimeout(() => {
          hideBuffering();
        }, bufferingDurationMs);
      }

      window.addEventListener('message', (event) => {
        if (!event.data || !event.data.type) return;

        if (event.data.type === 'adStarted') {
          adRunning = true;
          skipButton.style.display = 'block';
          hideBuffering();
          resetSkipButton();
          startCountdown();

          clearInterval(bufferingLoop);
          bufferingLoop = setInterval(() => {
            triggerBuffering();
          }, bufferingEveryMs);
        }

        if (event.data.type === 'adFinished') {
          adRunning = false;
          clearInterval(countdownTimer);
          clearInterval(bufferingLoop);
          clearTimeout(bufferingTimer);
          hideBuffering();
          skipButton.style.display = 'none';
          window.top.postMessage({ type: 'fail' }, '*');
        }
      });

      skipButton.addEventListener('click', () => {
        if (!adRunning) return;

        growSkipButton();

        if (countdownValue <= 0) {
          triggerBuffering();
        }
      });
    })(window, document);
  </script>
</body>
</html>
